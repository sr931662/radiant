steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/radiant/radianttrust:$COMMIT_SHA'
      - '-f'
      - 'server/Dockerfile'
      - 'server'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/radiant/radianttrust:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'radianttrust'
      - '--image'
      - 'asia-south2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/radiant/radianttrust:$COMMIT_SHA'
      - '--region'
      - 'asia-south2'
      - '--platform'
      - 'managed'

images:
  - 'asia-south2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/radiant/radianttrust:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
