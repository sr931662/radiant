<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: 'Georgia', serif; text-align: center; padding: 60px; }
    .border { border: 8px double #1b4332; padding: 40px; }
    h1 { color: #1b4332; font-size: 36px; }
    .cert-id { color: #888; font-size: 12px; }
  </style>
</head>
<body>
  <div class="border">
    <h1>Certificate of Completion</h1>
    <p style="font-size: 20px;">This certifies that</p>
    <h2 style="color: #2d6a4f;">{{ holder_name }}</h2>
    <p>has successfully completed the course</p>
    <h3>{{ course_title }}</h3>
    <p>Issued on {{ issued_date }}</p>
    <br>
    <img src="data:image/png;base64,{{ qr_data }}" width="100" height="100" alt="QR Code">
    <p class="cert-id">Certificate ID: {{ cert.unique_id }}</p>
  </div>
</body>
</html>
