<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: 'Georgia', serif; text-align: center; padding: 60px; }
    .border { border: 8px double #2d6a4f; padding: 40px; }
    h1 { color: #1b4332; font-size: 36px; }
    .cert-id { color: #888; font-size: 12px; }
    .qr { margin: 20px auto; }
  </style>
</head>
<body>
  <div class="border">
    <h1>Certificate of Participation</h1>
    <p style="font-size: 20px;">This is to certify that</p>
    <h2 style="color: #2d6a4f;">{{ holder_name }}</h2>
    <p>has successfully participated in the Faculty Development Programme</p>
    <h3>{{ fdp_title }}</h3>
    <p>held from {{ start_date }} to {{ end_date }} at {{ venue }}</p>
    <br>
    <img src="data:image/png;base64,{{ qr_data }}" width="100" height="100" class="qr" alt="QR Code">
    <p class="cert-id">Certificate ID: {{ cert.unique_id }}</p>
  </div>
</body>
</html>
