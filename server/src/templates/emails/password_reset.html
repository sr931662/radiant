<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; }
        .header { text-align: center; color: #1a56db; }
        .otp { font-size: 32px; font-weight: bold; text-align: center; letter-spacing: 8px; color: #1a56db; margin: 20px 0; }
        .footer { margin-top: 30px; font-size: 12px; color: #888; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="header">Radiant Education Trust</h2>
        <p>Hello,</p>
        <p>You have requested to reset your password. Use the following OTP:</p>
        <div class="otp">{{ otp }}</div>
        <p>This OTP is valid for 10 minutes. If you did not request this, please ignore this email.</p>
        <div class="footer">Radiant Education Trust | radianttrust.org</div>
    </div>
</body>
</html>
